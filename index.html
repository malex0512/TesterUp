<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="color-scheme" content="dark">
<meta name="theme-color" content="#06090f">
<title>FreeCash – Exklusive Prämien</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800;900&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

html{background:#06090f !important;color-scheme:dark;}

:root{
--bg:#06090f;
--card:#0b1220;
--card2:#111827;
--card3:#131d2e;
--green:#00d084;
--green2:#22c55e;
--green3:#4ade80;
--green4:#bbf7d0;
--gg:rgba(0,208,132,0.28);
--gg2:rgba(0,208,132,0.12);
--text:#f1f5f9;
--muted:#8da0b8;
--muted2:#64748b;
--r:20px;
--rs:14px;
}

html,body{
min-height:100vh;
background:#06090f !important;
background-color:#06090f !important;
font-family:'DM Sans',sans-serif;
color:var(--text);
display:flex;flex-direction:column;align-items:center;
overflow-x:hidden;
-webkit-font-smoothing:antialiased;
}

body::before{
content:'';position:fixed;inset:0;
background:
radial-gradient(ellipse 90% 45% at 50% -5%,rgba(0,208,132,0.12) 0%,transparent 65%),
radial-gradient(ellipse 50% 35% at 15% 105%,rgba(0,208,132,0.05) 0%,transparent 60%),
radial-gradient(ellipse 50% 35% at 85% 100%,rgba(34,197,94,0.04) 0%,transparent 60%);
pointer-events:none;z-index:0;
}

/* ═══ ELIGIBILITY LOADING SCREEN ═══ */
#eligScreen{
position:fixed;inset:0;
background:#06090f;
background-color:#06090f;
z-index:9999;
display:none;
flex-direction:column;
align-items:center;
justify-content:center;
padding:32px;
}

#eligScreen::before{
content:'';position:absolute;inset:0;
background:
radial-gradient(ellipse 80% 50% at 50% 0%,rgba(0,208,132,0.13) 0%,transparent 60%),
radial-gradient(ellipse 60% 40% at 50% 100%,rgba(34,197,94,0.06) 0%,transparent 60%);
pointer-events:none;
}

.elig-logo{
width:80px;height:80px;border-radius:22px;overflow:hidden;
margin-bottom:28px;
box-shadow:0 0 32px rgba(0,208,132,0.3),0 8px 32px rgba(0,0,0,0.6);
animation:logo-float 3s ease-in-out infinite;
position:relative;z-index:1;
}
.elig-logo img{width:80px;height:80px;object-fit:cover;display:block;border-radius:22px;}

.elig-spinner{
width:48px;height:48px;
border:3px solid rgba(0,208,132,0.12);
border-top:3px solid var(--green);
border-radius:50%;
animation:spin 0.9s linear infinite;
margin-bottom:24px;
box-shadow:0 0 18px rgba(0,208,132,0.25);
position:relative;z-index:1;
}

@keyframes spin{to{transform:rotate(360deg)}}

.elig-title{
font-family:'Sora',sans-serif;font-size:20px;font-weight:800;
color:#fff;margin-bottom:8px;position:relative;z-index:1;letter-spacing:-0.3px;
}

.elig-msg{
font-size:14px;color:var(--green2);font-weight:600;
min-height:22px;text-align:center;position:relative;z-index:1;
transition:opacity 0.3s ease;margin-bottom:28px;
}

.elig-bar-wrap{
width:240px;height:5px;background:rgba(255,255,255,0.06);
border-radius:99px;overflow:hidden;position:relative;z-index:1;
}

.elig-bar{
height:100%;border-radius:99px;
background:linear-gradient(90deg,#00a86b,#00d084,#22c55e);
box-shadow:0 0 12px rgba(0,208,132,0.6);
width:0%;transition:width 0.5s ease;
position:relative;overflow:hidden;
}

.elig-bar::after{
content:'';position:absolute;top:0;bottom:0;width:50px;
background:linear-gradient(90deg,transparent,rgba(255,255,255,0.4),transparent);
animation:shimmer 1.2s linear infinite;
}

@keyframes shimmer{0%{left:-50px}100%{left:110%}}

/* ═══ REDIRECT OVERLAY ═══ */
#redirectOverlay{
position:fixed;inset:0;
background:rgba(6,9,15,0.97);
z-index:9998;display:none;
flex-direction:column;align-items:center;justify-content:center;
padding:32px;backdrop-filter:blur(8px);
}
#redirectOverlay.show{display:flex;animation:fadeIn 0.3s ease;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

.redir-spinner{
width:52px;height:52px;
border:3px solid rgba(0,208,132,0.1);
border-top:3px solid var(--green);
border-right:3px solid var(--green2);
border-radius:50%;animation:spin 0.8s linear infinite;
margin-bottom:22px;box-shadow:0 0 22px rgba(0,208,132,0.3);
}

.redir-msg{
font-family:'Sora',sans-serif;font-size:17px;font-weight:700;
color:#fff;text-align:center;margin-bottom:8px;transition:opacity 0.3s ease;
}
.redir-sub{font-size:13px;color:var(--muted);text-align:center;}

/* ═══ PAGE WRAP ═══ */
.page-wrap{
width:100%;max-width:430px;min-height:100vh;
display:flex;flex-direction:column;align-items:center;
padding:0 0 40px;position:relative;z-index:1;
}

/* ═══ HEADER ═══ */
.header{
width:100%;display:flex;flex-direction:column;align-items:center;
padding:36px 24px 18px;
}

.logo-wrap{
width:84px;height:84px;border-radius:24px;
background:linear-gradient(135deg,#0f2818 0%,#0b1220 100%);
border:1.5px solid rgba(0,208,132,0.3);
display:flex;align-items:center;justify-content:center;
box-shadow:0 0 0 1px rgba(0,208,132,0.08),0 0 32px rgba(0,208,132,0.22),0 8px 32px rgba(0,0,0,0.6);
margin-bottom:14px;position:relative;overflow:hidden;padding:0;
animation:logo-float 4s ease-in-out infinite;
}

@keyframes logo-float{
0%,100%{transform:translateY(0);box-shadow:0 0 32px rgba(0,208,132,0.22),0 8px 32px rgba(0,0,0,0.6);}
50%{transform:translateY(-4px);box-shadow:0 0 44px rgba(0,208,132,0.35),0 14px 40px rgba(0,0,0,0.5);}
}

.logo-wrap img{width:84px;height:84px;border-radius:24px;object-fit:cover;display:block;}

.app-name{
font-family:'Sora',sans-serif;font-size:24px;font-weight:900;letter-spacing:-0.6px;
background:linear-gradient(90deg,#ffffff 0%,#00d084 100%);
-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
margin-bottom:8px;
}

.stars-row{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
.stars{color:var(--green);font-size:16px;letter-spacing:2px;text-shadow:0 0 12px rgba(0,208,132,0.6);}
.rating-num{font-size:13px;font-weight:700;color:var(--green2);}
.rating-sub{font-size:13px;color:var(--muted);font-weight:500;margin-bottom:9px;}

.spots-badge{
display:inline-flex;align-items:center;gap:5px;
font-size:11.5px;font-weight:700;color:var(--green2);letter-spacing:0.2px;
text-shadow:0 0 12px rgba(0,208,132,0.5);
animation:spots-pulse 2.2s ease-in-out infinite;
}

.spots-dot{
width:7px;height:7px;border-radius:50%;
background:var(--green);box-shadow:0 0 8px var(--green);
animation:dot-blink 1.4s ease-in-out infinite;flex-shrink:0;
}

@keyframes dot-blink{0%,100%{opacity:1}50%{opacity:0.3}}
@keyframes spots-pulse{
0%,100%{text-shadow:0 0 12px rgba(0,208,132,0.5)}
50%{text-shadow:0 0 22px rgba(0,208,132,0.85)}
}

/* ═══ PROGRESS ═══ */
.progress-wrap{width:calc(100% - 40px);margin:0 20px 22px;}

.progress-labels{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;}
.progress-label{font-size:11px;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:1px;}
.step-indicator{
font-family:'Sora',sans-serif;font-size:12px;font-weight:800;color:var(--green2);
background:rgba(0,208,132,0.1);padding:2px 9px;border-radius:99px;border:1px solid rgba(0,208,132,0.2);
}

.progress-track{
width:100%;height:7px;background:rgba(255,255,255,0.06);
border-radius:99px;overflow:hidden;position:relative;
}

.progress-fill{
height:100%;border-radius:99px;
background:linear-gradient(90deg,#00a86b,#00d084,#22c55e);
box-shadow:0 0 14px rgba(0,208,132,0.7);
transition:width 0.6s cubic-bezier(.4,0,.2,1);
width:33%;position:relative;overflow:hidden;
}

.progress-fill::after{
content:'';position:absolute;top:0;bottom:0;width:60px;
background:linear-gradient(90deg,transparent,rgba(255,255,255,0.35),transparent);
animation:shimmer 2s linear infinite;
}

/* ═══ CARD ═══ */
.card{
width:calc(100% - 28px);background:var(--card);border-radius:var(--r);
border:1px solid rgba(255,255,255,0.07);
padding:26px 20px 22px;
box-shadow:0 0 0 1px rgba(0,208,132,0.04),0 4px 6px rgba(0,0,0,0.3),0 20px 60px rgba(0,0,0,0.5);
position:relative;overflow:hidden;
}

.card::before{
content:'';position:absolute;top:0;left:0;right:0;height:1px;
background:linear-gradient(90deg,transparent 0%,rgba(0,208,132,0.5) 50%,transparent 100%);
}

/* ═══ SLIDES ═══ */
.slide{display:none;}
.slide.active{display:block;animation:fadeUp 0.38s cubic-bezier(.4,0,.2,1);}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.urgency-badge{
display:inline-flex;align-items:center;gap:5px;
background:rgba(0,208,132,0.1);border:1px solid rgba(0,208,132,0.25);
border-radius:99px;padding:5px 13px;
font-size:12px;font-weight:700;color:var(--green2);
margin-bottom:14px;letter-spacing:0.1px;
}

.slide-headline{
font-family:'Sora',sans-serif;font-size:20px;font-weight:800;
line-height:1.25;color:#fff;margin-bottom:8px;letter-spacing:-0.4px;
}

.slide-sub{font-size:13.5px;color:var(--muted);line-height:1.55;margin-bottom:20px;font-style:italic;}

.green-note{
font-size:12.5px;color:var(--green2);font-weight:600;
margin-bottom:16px;display:flex;align-items:center;gap:5px;
}
.green-note::before{content:'→';font-size:11px;opacity:0.7;}

/* ═══ BUTTONS ═══ */
.btn-group{display:flex;flex-direction:column;gap:11px;margin-bottom:20px;}

.choice-btn{
width:100%;padding:16px 18px;border-radius:15px;
background:linear-gradient(135deg,#0d1e14 0%,var(--card2) 100%);
border:1.5px solid rgba(255,255,255,0.07);
color:var(--text);font-family:'DM Sans',sans-serif;
font-size:15px;font-weight:600;text-align:left;cursor:pointer;
transition:all 0.2s cubic-bezier(.4,0,.2,1);
display:flex;align-items:center;gap:12px;
position:relative;overflow:hidden;-webkit-tap-highlight-color:transparent;
}

.choice-btn::before{
content:'';position:absolute;right:16px;top:50%;transform:translateY(-50%);
width:20px;height:20px;border-radius:50%;
border:1.5px solid rgba(255,255,255,0.12);transition:all 0.2s;
}

.choice-btn:hover,.choice-btn:focus{
border-color:rgba(0,208,132,0.5);
background:linear-gradient(135deg,#0f2a1c 0%,#141f1a 100%);
box-shadow:0 0 20px rgba(0,208,132,0.14),0 4px 16px rgba(0,0,0,0.3);
transform:translateY(-1px);outline:none;
}

.choice-btn:hover::before{border-color:var(--green);}
.choice-btn:active{transform:scale(0.98) translateY(0);}

.choice-btn.selected{
border-color:var(--green);
background:linear-gradient(135deg,rgba(0,208,132,0.13) 0%,#141f1a 100%);
box-shadow:0 0 24px rgba(0,208,132,0.22),0 4px 16px rgba(0,0,0,0.3);
animation:select-pop 0.3s cubic-bezier(.4,0,.2,1);
}

.choice-btn.selected::before{
background:var(--green);border-color:var(--green);box-shadow:0 0 10px var(--green);
}

@keyframes select-pop{0%{transform:scale(1)}40%{transform:scale(1.025)}100%{transform:scale(1)}}

.btn-emoji{font-size:20px;flex-shrink:0;}

.trust-text{font-size:12.5px;color:var(--muted2);text-align:center;line-height:1.5;}
.trust-text strong{color:var(--muted);font-weight:600;}

.info-card{
background:linear-gradient(135deg,rgba(0,208,132,0.1) 0%,rgba(0,208,132,0.04) 100%);
border:1px solid rgba(0,208,132,0.28);border-radius:var(--rs);
padding:12px 15px;margin-bottom:18px;
font-size:13px;color:var(--green4);font-weight:600;
display:flex;align-items:center;gap:8px;
box-shadow:0 0 20px rgba(0,208,132,0.08);line-height:1.45;
}

.trust-checks{display:flex;flex-direction:column;gap:7px;margin-top:18px;}

.trust-check{
display:flex;align-items:flex-start;gap:9px;
font-size:12.5px;color:var(--muted);line-height:1.45;
}

.check-icon{
width:18px;height:18px;border-radius:50%;
background:rgba(0,208,132,0.12);border:1px solid rgba(0,208,132,0.3);
color:var(--green);font-size:10px;font-weight:800;
display:flex;align-items:center;justify-content:center;
flex-shrink:0;margin-top:1px;
}

/* ═══ FINAL SECTION ═══ */
.final-section{display:none;width:calc(100% - 28px);}

.final-section.active{
display:flex;flex-direction:column;align-items:center;
animation:fadeUp 0.45s cubic-bezier(.4,0,.2,1);
}

.final-card{
width:100%;background:var(--card);border-radius:var(--r);
border:1px solid rgba(0,208,132,0.22);
padding:32px 22px 28px;
box-shadow:0 0 0 1px rgba(0,208,132,0.05),0 0 60px rgba(0,208,132,0.1),0 8px 40px rgba(0,0,0,0.5);
text-align:center;position:relative;overflow:hidden;
}

.final-card::before{
content:'';position:absolute;top:0;left:0;right:0;height:2px;
background:linear-gradient(90deg,transparent,var(--green),transparent);
box-shadow:0 0 24px var(--green);
}

.unlock-wrap{
position:relative;display:inline-flex;
align-items:center;justify-content:center;margin-bottom:18px;
}

.unlock-ring{
position:absolute;width:88px;height:88px;border-radius:50%;
border:2px solid rgba(0,208,132,0.2);
animation:ring-expand 2s ease-out infinite;
}
.unlock-ring2{
position:absolute;width:72px;height:72px;border-radius:50%;
border:1.5px solid rgba(0,208,132,0.15);
animation:ring-expand 2s ease-out 0.5s infinite;
}

@keyframes ring-expand{
0%{transform:scale(0.85);opacity:0.8}100%{transform:scale(1.2);opacity:0}
}

.unlock-icon{
font-size:52px;position:relative;z-index:1;
filter:drop-shadow(0 0 18px rgba(0,208,132,0.65));
animation:unlock-bob 3s ease-in-out infinite;
}

@keyframes unlock-bob{
0%,100%{transform:scale(1);filter:drop-shadow(0 0 18px rgba(0,208,132,0.65));}
50%{transform:scale(1.06);filter:drop-shadow(0 0 30px rgba(0,208,132,0.9));}
}

.final-headline{
font-family:'Sora',sans-serif;font-size:23px;font-weight:900;
color:#fff;letter-spacing:-0.5px;margin-bottom:9px;line-height:1.2;
}

.final-sub{font-size:13.5px;color:var(--muted);line-height:1.55;margin-bottom:18px;}

.offer-prompt-card{
background:linear-gradient(135deg,rgba(0,208,132,0.14) 0%,rgba(0,168,107,0.07) 100%);
border:1.5px solid rgba(0,208,132,0.38);
border-radius:var(--rs);padding:14px 16px;margin-bottom:20px;
font-size:13.5px;color:#fff;font-weight:600;
display:flex;align-items:flex-start;gap:9px;text-align:left;line-height:1.5;
box-shadow:0 0 28px rgba(0,208,132,0.12),0 2px 8px rgba(0,0,0,0.3);
position:relative;overflow:hidden;
}

.offer-prompt-card::before{
content:'';position:absolute;top:0;left:0;right:0;height:1px;
background:linear-gradient(90deg,transparent,rgba(0,208,132,0.6),transparent);
}

.offer-prompt-icon{font-size:18px;flex-shrink:0;margin-top:1px;}

.cta-btn{
display:block;width:100%;padding:19px 24px;border-radius:16px;
background:linear-gradient(135deg,#00d084 0%,#00a86b 100%);
color:#fff;font-family:'Sora',sans-serif;font-size:16px;font-weight:800;
text-align:center;text-decoration:none;border:none;cursor:pointer;
box-shadow:0 0 0 1px rgba(0,208,132,0.3),0 0 30px rgba(0,208,132,0.5),0 4px 20px rgba(0,208,132,0.3),0 2px 6px rgba(0,0,0,0.4);
transition:all 0.25s ease;letter-spacing:0.1px;
animation:cta-pulse 2.8s ease-in-out infinite;
position:relative;overflow:hidden;
-webkit-tap-highlight-color:transparent;
}

.cta-btn::after{
content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;
background:linear-gradient(90deg,transparent,rgba(255,255,255,0.18),transparent);
animation:cta-shine 3s linear 1.5s infinite;
}

@keyframes cta-shine{0%{left:-60%}100%{left:160%}}

@keyframes cta-pulse{
0%,100%{box-shadow:0 0 30px rgba(0,208,132,0.5),0 4px 20px rgba(0,208,132,0.3),0 2px 6px rgba(0,0,0,0.4);}
50%{box-shadow:0 0 50px rgba(0,208,132,0.7),0 6px 28px rgba(0,208,132,0.45),0 2px 6px rgba(0,0,0,0.4);}
}

.cta-btn:hover{
transform:translateY(-2px) scale(1.015);
box-shadow:0 0 60px rgba(0,208,132,0.75),0 8px 32px rgba(0,208,132,0.5),0 2px 8px rgba(0,0,0,0.4);
animation:none;
}

.cta-btn:active{transform:scale(0.98);animation:none;}

.beginner-line{
font-size:12.5px;color:var(--muted2);font-style:italic;
margin-top:12px;text-align:center;line-height:1.5;
}

.final-trust{margin-top:16px;display:flex;flex-direction:column;gap:7px;}

.final-trust-item{
font-size:13px;color:var(--muted2);
display:flex;align-items:center;justify-content:center;gap:6px;
}

.final-trust-item .chk{color:var(--green);font-weight:800;font-size:14px;}

.live-activity{
margin-top:20px;
background:rgba(255,255,255,0.025);
border:1px solid rgba(255,255,255,0.06);
border-radius:var(--rs);padding:14px 16px;
display:flex;flex-direction:column;gap:9px;width:100%;
}

.live-activity-title{
font-size:11px;font-weight:700;color:var(--muted2);
text-transform:uppercase;letter-spacing:0.9px;margin-bottom:2px;
}

.live-item{
display:flex;align-items:center;gap:8px;
font-size:12.5px;color:var(--muted);line-height:1.4;
}

.live-dot{
